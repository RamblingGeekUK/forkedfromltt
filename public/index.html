<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <title>Forked From LTT</title>
  <link href="css/vendor/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body>
  <div id="shared-navbar"></div>
  <div class="container py-4 site-content">
    <div class="incident-banner" id="incidentBanner" role="alert">
      <div class="incident-banner-content">
        <span class="incident-badge">Temporary Notice</span>
        <p>
          We had a data incident between 8th and 9th April 2026. Read the full update here:
          <a href="/oops.html">Status Statement</a>
        </p>
      </div>
    </div>
    <!-- Single grid for all creators -->
    <div id="allCreatorsGrid" class="row g-4" style="display:none;"></div>
  </div>
  <div id="shared-modals"></div>
  <div id="shared-footer"></div>
  <script src="js/vendor/bootstrap.bundle.min.js"></script>
  <script src="js/script.js"></script>
  <script src="js/faq.js"></script>
  <script src="js/suggestions.js"></script>
  <script>
    // Hide temporary incident banner after 7 days from 10 Apr 2026
    (function () {
      const banner = document.getElementById('incidentBanner');
      if (!banner) return;

      // Expires at start of 18 Apr 2026 local time (7 full days from 10 Apr)
      const expiresAt = new Date('2026-04-18T00:00:00');
      if (new Date() >= expiresAt) {
        banner.style.display = 'none';
      }
    })();

    // Dynamically load shared navbar
    fetch('navbar.html')
      .then(res => res.text())
      .then(html => {
        document.getElementById('shared-navbar').innerHTML = html;
        document.getElementById('nav-fullyforked')?.classList.add('active');
      });
    // Dynamically load shared modals
    fetch('modals/modals.html')
      .then(res => res.text())
      .then(html => {
        document.getElementById('shared-modals').innerHTML = html;
        document.dispatchEvent(new Event('modalsLoaded'));
      });
    // Dynamically load shared sticky footer
    fetch('footer.html')
      .then(res => res.text())
      .then(html => {
        document.getElementById('shared-footer').innerHTML = html;
      });
  </script>
  <script src="js/modals.js"></script>
</body>
</html>
